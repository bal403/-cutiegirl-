<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>dreamygirl ☁️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            height: -webkit-fill-available; 
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            background: linear-gradient(to bottom, #03010a, #0b0314, #120524, #05010b);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* --- ONE-TAP SCREEN INTRO --- */
        #welcomeOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #03010a, #0d041a);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
        }

        .enter-text {
            color: #ff9ff3;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 159, 243, 0.5);
            animation: pulse 1.5s infinite alternate;
        }

        .enter-subtext {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.85rem;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .glow-bg {
            position: absolute;
            width: 160vw;
            height: 90vh;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.12) 0%, rgba(139, 92, 246, 0.04) 50%, rgba(0,0,0,0) 72%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* --- PANGALAN SA TAAS --- */
        .name-banner {
            position: absolute;
            top: 12%;
            width: 100%;
            text-align: center;
            z-index: 10;
            opacity: 0;
            transform: translateY(-20px);
        }

        .loaded .name-banner {
            animation: show-name 2s cubic-bezier(0.34, 1.56, 0.64, 1) 4.5s forwards;
        }

        .name-text {
            font-size: 2.4rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px #ff7eb3, 0 0 20px #ff758c, 0 0 40px #8b5cf6, 0 0 60px #00d2d3;
            letter-spacing: 4px;
            display: inline-block;
            animation: bounce-sway 4s ease-in-out infinite alternate;
        }

        /* --- MGA IBON SA TAAS --- */
        .birds-container {
            position: absolute;
            top: 4%;
            width: 100%;
            height: 140px;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
        }
        .loaded .birds-container { opacity: 1; transition: opacity 2s ease 4s; }

        .bird {
            position: absolute;
            width: 20px;
            height: 11px;
            display: flex;
        }
        .bird::before, .bird::after {
            content: '';
            flex: 1;
            height: 100%;
            border: 2px solid #ffbdf4;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
        }
        .bird::before { border-right: none; transform-origin: right bottom; animation: wing-flap-left 0.22s ease-in-out infinite alternate; }
        .bird::after { border-left: none; transform-origin: left bottom; animation: wing-flap-right 0.22s ease-in-out infinite alternate; }

        #bird1 { top: 10px; animation: fly-left-right 15s linear infinite; }
        #bird2 { top: 40px; animation: fly-right-left 18s linear infinite; }
        #bird3 { top: 75px; animation: fly-left-right 12s linear infinite 2.5s; }
        #bird4 { top: 105px; animation: fly-right-left 14s linear infinite 5s; }

        /* --- THE GARDEN STAGE --- */
        .garden {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 2;
            padding-bottom: 25px;
        }

        /* LUPA AT DAMO */
        .soil-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 42px;
            z-index: 5;
        }

        .soil {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 25px;
            background: linear-gradient(to top, #010003, #0b0312);
            border-top: 2px solid #230f36;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.9);
        }

        .grass-layer {
            position: absolute;
            bottom: 18px;
            width: 100%;
            height: 30px;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }

        .grass {
            width: 4px;
            height: 26px;
            background: linear-gradient(to top, #091711, #1b4332, #2d6a4f, #52b788);
            border-radius: 4px 4px 0 0;
            transform-origin: bottom center;
            animation: grass-sway 3.2s ease-in-out infinite alternate;
        }
        .grass:nth-child(2n) { animation-duration: 2.4s; transform: rotate(5deg); height: 29px; }
        .grass:nth-child(3n) { animation-duration: 3.5s; transform: rotate(-7deg); height: 24px; }

        .grass-layer.front { bottom: 22px; opacity: 0.95; filter: brightness(1.3); }
        .grass-layer.front .grass { animation-delay: 0.3s; height: 19px; }

        /* --- FLOWERS ARRANGEMENT --- */
        .flowers-group {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            width: 100%;
            height: 62vh;
            max-height: 440px;
            gap: 12px;
            padding: 0 8px;
        }

        .flower-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* 5 Dynamic Scaling Flowers */
        .flower-container.f-center { width: 115px; height: 100%; z-index: 4; }
        .flower-container.f-left1, .flower-container.f-right1 { width: 85px; height: 80%; z-index: 3; }
        .flower-container.f-left2, .flower-container.f-right2 { width: 75px; height: 62%; z-index: 2; }

        .stem {
            position: relative;
            width: 5px;
            height: 0%; 
            background: linear-gradient(to right, #0b2218, #22543d, #143626);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            box-shadow: 0 0 8px rgba(34, 84, 61, 0.4);
        }
        .loaded .stem { animation: grow-stem 3.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        /* Growth Delays */
        .f-center .stem { animation-delay: 0s; }
        .f-left1 .stem  { animation-delay: 0.4s; }
        .f-right1 .stem { animation-delay: 0.6s; }
        .f-left2 .stem  { animation-delay: 0.9s; }
        .f-right2 .stem { animation-delay: 1.1s; }

        /* Leaves */
        .leaf {
            position: absolute;
            width: 25px;
            height: 14px;
            background: linear-gradient(to bottom left, #1b4332, #050d0a);
            border-radius: 0 25px 0 25px;
            opacity: 0;
        }
        .leaf.left { left: -22px; bottom: 32%; transform-origin: right bottom; }
        .leaf.right { right: -22px; bottom: 52%; transform-origin: left bottom; }
        
        .f-center .leaf { width: 28px; height: 16px; }
        .f-left2 .leaf, .f-right2 .leaf { width: 20px; height: 11px; }

        .loaded .leaf.left { animation: bloom-leaf-left 1.2s ease-out 1.6s forwards; }
        .loaded .leaf.right { animation: bloom-leaf-right 1.2s ease-out 2.2s forwards; }

        /* Flower Heads Dimensions */
        .flower-head {
            position: absolute;
            top: 0;
            transform: translateY(-50%) scale(0);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .f-center .flower-head { width: 110px; height: 110px; }
        .f-left1 .flower-head, .f-right1 .flower-head { width: 85px; height: 85px; }
        .f-left2 .flower-head, .f-right2 .flower-head { width: 75px; height: 75px; }

        .loaded .flower-head { animation: bloom-head 2.5s cubic-bezier(0.34, 1.4, 0.64, 1) 2.5s forwards; }
        
        .f-center .flower-head { animation-delay: 2.4s; }
        .f-left1 .flower-head  { animation-delay: 2.8s; }
        .f-right1 .flower-head { animation-delay: 3.1s; }
        .f-left2 .flower-head  { animation-delay: 3.4s; }
        .f-right2 .flower-head { animation-delay: 3.7s; }

        /* WALANG DECORATION LABAS - SOLID PABILOG PIC HOLDER */
        .center-circle {
            position: relative;
            border-radius: 50%;
            z-index: 10;
            background-color: #ff9f43;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 159, 67, 0.6), inset 0 0 8px rgba(0,0,0,0.3);
        }
        .f-center .center-circle { width: 34px; height: 34px; border: 2px solid #ff9f43; }
        .f-left1 .center-circle, .f-right1 .center-circle { width: 26px; height: 26px; border: 1.8px solid #ffb8b8; box-shadow: 0 0 10px rgba(255,184,184,0.6); }
        .f-left2 .center-circle, .f-right2 .center-circle { width: 22px; height: 22px; border: 1.5px solid #00d2d3; box-shadow: 0 0 10px rgba(0,210,211,0.6); }
        
        /* DIRECT TOTOONG IMG TAG */
        .center-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* PETALS SKELETONS */
        .petals {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: float-sway 5s ease-in-out infinite alternate;
        }

        .petal {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50% 50% 50% 50% / 35% 35% 65% 65%;
            transform-origin: 50% 0%; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.18), inset 0 -3px 8px rgba(0,0,0,0.1);
        }

        /* Center Flower Colors (Hot Pink Flame) */
        .f-center .petal {
            width: 35px;
            height: 56px;
            background: linear-gradient(to top, #ee5253 0%, #f368e0 45%, #ff9ff3 85%, #ffffff 100%);
        }
        /* Inner Side Flowers Colors (Magic Purple-Pink Theme) */
        .f-left1 .petal, .f-right1 .petal {
            width: 26px;
            height: 44px;
            background: linear-gradient(to top, #5758bb, #9980fa, #dff9fb, #ffffff);
        }
        /* Outer Side Flowers Colors (Cyan-Aurora Mint Theme) */
        .f-left2 .petal, .f-right2 .petal {
            width: 22px;
            height: 38px;
            background: linear-gradient(to top, #10ac84, #00d2d3, #eccc68, #ffffff);
        }

        /* 12 Petals Angles */
        .petal:nth-child(1)  { transform: translate(-50%, -100%) rotate(0deg); }
        .petal:nth-child(2)  { transform: translate(-50%, -100%) rotate(30deg); }
        .petal:nth-child(3)  { transform: translate(-50%, -100%) rotate(60deg); }
        .petal:nth-child(4)  { transform: translate(-50%, -100%) rotate(90deg); }
        .petal:nth-child(5)  { transform: translate(-50%, -100%) rotate(120deg); }
        .petal:nth-child(6)  { transform: translate(-50%, -100%) rotate(150deg); }
        .petal:nth-child(7)  { transform: translate(-50%, -100%) rotate(180deg); }
        .petal:nth-child(8)  { transform: translate(-50%, -100%) rotate(210deg); }
        .petal:nth-child(9)  { transform: translate(-50%, -100%) rotate(240deg); }
        .petal:nth-child(10) { transform: translate(-50%, -100%) rotate(270deg); }
        .petal:nth-child(11) { transform: translate(-50%, -100%) rotate(300deg); }
        .petal:nth-child(12) { transform: translate(-50%, -100%) rotate(330deg); }

        .particle { position: absolute; border-radius: 50%; pointer-events: none; opacity: 0; z-index: 6; }

        /* --- DAMIHAN ANG BUTTERFLY (8 ANIMATED BUTTERFLIES) --- */
        .butterfly-box { 
            position: absolute; 
            width: 22px; 
            height: 22px; 
            z-index: 15; 
            transform-style: preserve-3d; 
            opacity: 0; 
            display: none; 
        }
        .loaded .butterfly-box { display: block; }

        /* Mas Pinadaming Flight Vectors */
        #b1 { animation: flight-vector-1 12s linear infinite 3.8s; }
        #b2 { animation: flight-vector-2 15s linear infinite 4.2s; }
        #b3 { animation: flight-vector-3 9s linear infinite 4.8s; }
        #b4 { animation: flight-vector-4 14s linear infinite 5.2s; }
        #b5 { animation: flight-vector-1 11s linear infinite 6.0s; top: -100px; }
        #b6 { animation: flight-vector-2 16s linear infinite 6.5s; top: -50px; }
        #b7 { animation: flight-vector-3 10s linear infinite 7.0s; top: -140px; }
        #b8 { animation: flight-vector-4 13s linear infinite 7.5s; top: -80px; }

        .butterfly { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transform: rotateX(50deg) rotateY(12deg); }
        .wing { position: absolute; width: 11px; height: 15px; }
        
        /* Vibrant Color Themes for Butterflies */
        #b1 .wing, #b5 .wing { background: linear-gradient(135deg, #ff9ff3, #feca57); box-shadow: 0 0 6px #ff9ff3; }
        #b2 .wing, #b6 .wing { background: linear-gradient(135deg, #00d2d3, #54a0ff); box-shadow: 0 0 6px #00d2d3; }
        #b3 .wing, #b7 .wing { background: linear-gradient(135deg, #ff6b6b, #ff8144); box-shadow: 0 0 6px #ff6b6b; }
        #b4 .wing, #b8 .wing { background: linear-gradient(135deg, #fffa65, #fff200); box-shadow: 0 0 6px #fffa65; }

        .wing.left { left: 0; border-radius: 35% 65% 40% 60% / 40% 60% 35% 65%; transform-origin: right center; animation: flap-left 0.09s ease-in-out infinite alternate; }
        .wing.right { right: 0; border-radius: 65% 35% 60% 40% / 60% 40% 65% 35%; transform-origin: left center; animation: flap-right 0.09s ease-in-out infinite alternate; }

        /* --- CORE PHYSICS ANIMATIONS --- */
        @keyframes pulse { 0% { transform: scale(0.96); opacity: 0.75; } 100% { transform: scale(1.04); opacity: 1; } }
        @keyframes bounce-sway { 0% { transform: translateY(0) rotate(-2deg); } 100% { transform: translateY(-7px) rotate(2deg); } }
        @keyframes show-name { 0% { opacity: 0; transform: translateY(-20px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes grow-stem { 0% { height: 0%; } 100% { height: 75%; } }
        @keyframes bloom-leaf-left { 0% { opacity: 0; transform: scale(0) scaleX(-1) rotate(-25deg); } 100% { opacity: 1; transform: scale(1) scaleX(-1) rotate(18deg); } }
        @keyframes bloom-leaf-right { 0% { opacity: 0; transform: scale(0) rotate(-25deg); } 100% { opacity: 1; transform: scale(1) rotate(18deg); } }
        @keyframes bloom-head { 0% { transform: translateY(-50%) scale(0) rotate(0deg); } 100% { transform: translateY(-50%) scale(1) rotate(360deg); } }
        @keyframes float-sway { 0% { transform: rotate(-2.5deg); } 100% { transform: rotate(2.5deg); } }
        @keyframes grass-sway { 0% { transform: rotate(-5deg); } 100% { transform: rotate(9deg); } }
        @keyframes particle-rise { 0% { transform: translateY(0) scale(0); opacity: 0; } 40% { opacity: 0.9; } 100% { transform: translateY(-130px) scale(1.3); opacity: 0; } }
        @keyframes flap-left { 0% { transform: rotateY(-75deg); } 100% { transform: rotateY(25deg); } }
        @keyframes flap-right { 0% { transform: rotateY(75deg); } 100% { transform: rotateY(-25deg); } }
        
        @keyframes wing-flap-left { 0% { transform: rotateZ(-35deg); } 100% { transform: rotateZ(25deg); } }
        @keyframes wing-flap-right { 0% { transform: rotateZ(35deg); } 100% { transform: rotateZ(-25deg); } }

        /* Birds Pathing */
        @keyframes fly-left-right {
            0% { left: -15%; transform: scale(0.55) translateY(0px); }
            50% { transform: scale(0.55) translateY(-12px); }
            100% { left: 115%; transform: scale(0.55) translateY(0px); }
        }
        @keyframes fly-right-left {
            0% { left: 115%; transform: scaleX(-1) scale(0.5) translateY(0px); }
            50% { transform: scaleX(-1) scale(0.5) translateY(12px); }
            100% { left: -15%; transform: scaleX(-1) scale(0.5) translateY(0px); }
        }

        /* Enhanced Butterfly Orbit Vectors */
        @keyframes flight-vector-1 {
            0% { opacity: 0; transform: translateX(-45px) translateY(-160px) rotate(0deg); }
            5% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-45px) translateY(-160px) rotate(360deg); }
        }
        @keyframes flight-vector-2 {
            0% { opacity: 0; transform: translateX(45px) translateY(-110px) rotate(180deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateX(45px) translateY(-110px) rotate(540deg); }
        }
        @keyframes flight-vector-3 {
            0% { opacity: 0; transform: translateX(-15px) translateY(-50px) rotate(360deg); }
            5% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-15px) translateY(-50px) rotate(0deg); }
        }
        @keyframes flight-vector-4 {
            0% { opacity: 0; transform: translateX(20px) translateY(-200px) rotate(90deg); }
            8% { opacity: 1; }
            100% { opacity: 0; transform: translateX(20px) translateY(-200px) rotate(450deg); }
        }

        @media screen and (max-width: 380px) {
            .name-text { font-size: 1.2rem; }
            .flowers-group { transform: scale(0.82); transform-origin: bottom center; gap: 4px; }
        }
    </style>
</head>

                    <div class="leaf left"></div><div class="leaf right"></div>
                    <div class="flower-head">
                        <div class="petals">
                            <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
                        </div>
                        <div class="center-circle">
                            <!-- PALITAN ANG LINK SA SRC NITO PARA SA PANG-LIMANG BULAKLAK -->
                            <img src="flower5.jpeg" class="center-photo">
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- MAGANDANG LUPA AT ANIMATED DAMO -->
        <div class="soil-container">
            <div class="grass-layer back" id="backGrass"></div>
            <div class="soil"></div>
            <div class="grass-layer front" id="frontGrass"></div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('welcomeOverlay');
        const audioPlayer = document.getElementById('bgMusic');
        const mainContainer = document.querySelector('.flower-container.f-center');
        const butterflies = document.querySelectorAll('.butterfly-box');

        // Automatic Grass Generator
        function generateGrass() {
            const backG = document.getElementById('backGrass');
            const frontG = document.getElementById('frontGrass');
            for (let i = 0; i < 42; i++) {
                backG.appendChild(document.createElement('div')).classList.add('grass');
                frontG.appendChild(document.createElement('div')).classList.add('grass');
            }
        }
        generateGrass();

        // Safe Trigger upon tap
        function startGarden() {
            audioPlayer.play().catch(e => console.log("Audio wake success."));
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
                document.body.classList.add('loaded');
                initMagicEffects();
            }, 800);
        }

        // Particle Glow Engine
        function initMagicEffects() {
            setTimeout(() => {
                butterflies.forEach(b => b.style.opacity = "1");

                setInterval(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    const size = Math.random() * 4 + 2.5;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    const randomX = Math.random() * 80 - 40; 
                    particle.style.left = `calc(50% + ${randomX}px)`;
                    particle.style.top = `40px`; 
                    particle.style.animation = `particle-rise ${Math.random() * 1.6 + 1.2}s ease-out forwards`;
                    
                    const colors = ['#ffffff', '#ff9ff3', '#ffe49e', '#00d2d3', '#fffa65'];
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.boxShadow = `0 0 6px ${particle.style.background}`;
                    
                    mainContainer.appendChild(particle);
                    setTimeout(() => { particle.remove(); }, 2500);
                }, 280);
            }, 3800);
        }
    </script>
</body>
</html>
